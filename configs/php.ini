; PHP runtime configuration — bind-mounted from configs/php.ini
; Edit on the host machine; restart php container to apply (no rebuild needed).
; Changes: docker compose restart php

[PHP]
; Memory — generous for dev; tighten in production
memory_limit            = 512M
max_execution_time      = 60
max_input_time          = 60
max_input_vars          = 3000
upload_max_filesize     = 100M
post_max_size           = 100M

; Error display — show all in development
display_errors          = On
display_startup_errors  = On
log_errors              = On
error_log               = /var/log/php/error.log
error_reporting         = E_ALL & ~E_DEPRECATED & ~E_USER_DEPRECATED

; Realpath cache — reduces stat() syscalls, critical for Laravel performance
realpath_cache_size     = 4096k
realpath_cache_ttl      = 600

; Output buffering
output_buffering        = 4096

; Default charset
default_charset         = "UTF-8"

[Date]
date.timezone           = Europe/Prague

[mail function]
; msmtp relays mail — dev sends to Mailpit, prod sends to Gmail (see configs/msmtprc)
sendmail_path           = /usr/bin/msmtp -t
mail.add_x_header       = Off
mail.log                = /var/log/mail/php_mail.log

[opcache]
opcache.enable                  = 1
opcache.enable_cli              = 0
opcache.memory_consumption      = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files   = 20000
; validate_timestamps=1 checks file mtime on each request — needed in dev for live edits
; Set to 0 in production (requires opcache reset on deploy) for maximum performance
opcache.validate_timestamps     = 1
opcache.revalidate_freq         = 2
opcache.fast_shutdown           = 1
; JIT — PHP 8+ only; tracing JIT gives best results for typical Laravel workloads
opcache.jit                     = tracing
opcache.jit_buffer_size         = 64M

[pgsql]
pgsql.allow_persistent          = On
pgsql.auto_reset_persistent     = Off
pgsql.max_persistent            = -1
pgsql.max_links                 = -1

[Session]
; Session driver is controlled by Laravel (.env SESSION_DRIVER=database)
; php.ini session settings are overridden by Laravel's session manager
session.gc_maxlifetime          = 7200
