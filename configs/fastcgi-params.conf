# FastCGI parameter overrides — included after the built-in fastcgi_params.
# Edit on the host machine; restart nginx to apply (no rebuild needed).

# SCRIPT_FILENAME tells php-fpm which file to execute.
# Must resolve to the absolute path inside the php container.
fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

# PATH_INFO for PHP path-info style URLs
fastcgi_param PATH_INFO $fastcgi_path_info;

# Block HTTP_PROXY injection (httpoxy vulnerability)
fastcgi_param HTTP_PROXY "";

# Pass query string explicitly
fastcgi_param QUERY_STRING $query_string;
