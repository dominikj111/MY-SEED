; PHP-FPM pool configuration — bind-mounted from configs/php-fpm.d/www.conf
; Replaces the default www.conf inside the PHP image.
; Edit on the host machine; restart php container to apply (no rebuild needed).
; Changes: docker compose restart php

[www]
user  = www-data
group = www-data

; Listen on TCP (required for Docker networking — nginx resolves php:9000 via upstream)
listen = 0.0.0.0:9000

listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

; Process management — dynamic scales between min and max based on load
pm                   = dynamic
pm.max_children      = 50
pm.start_servers     = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 20
; Recycle workers after N requests to prevent gradual memory leaks
pm.max_requests      = 500

; Status page — useful for monitoring / health checks
; Access via nginx location /fpm-status { fastcgi_pass php_fpm; }
pm.status_path       = /fpm-status

; Slow log — records requests exceeding this threshold
; Inspect at logs/php/slow.log on the host
slowlog              = /var/log/php/slow.log
request_slowlog_timeout = 5s

; Route errors and info to the bound log directory
php_admin_value[error_log]      = /var/log/php/fpm-error.log
php_admin_flag[log_errors]      = on

; Temp directory for uploads
php_admin_value[upload_tmp_dir] = /tmp

; Prevent info leakage in headers
php_admin_flag[expose_php]      = off
