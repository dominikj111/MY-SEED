<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPA Example · the-seed</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f3f4f6;
               min-height: 100vh; display: flex; align-items: flex-start; justify-content: center;
               padding: 3rem 1rem; }
        .wrap { max-width: 680px; width: 100%; }
        h1 { font-size: 1.5rem; margin-bottom: .4rem; }
        p  { color: #6b7280; font-size: .9rem; margin-bottom: 1.5rem; }
        code { background: #e5e7eb; padding: .1em .35em; border-radius: 4px; font-size: .85em; color: #374151; }
        .status { display: inline-flex; align-items: center; gap: .5rem;
                  padding: .3rem .9rem; border-radius: 99px; font-size: .85rem;
                  font-weight: 600; margin-bottom: 1.5rem; }
        .ok      { background: #d1fae5; color: #065f46; }
        .error   { background: #fee2e2; color: #991b1b; }
        .loading { background: #e5e7eb; color: #6b7280; }
        pre { background: #1e1e2e; color: #cdd6f4; padding: 1.25rem; border-radius: 8px;
              font-size: .82rem; overflow-x: auto; line-height: 1.6; }
        nav { margin-top: 1.5rem; font-size: .85rem; }
        nav a { color: #6366f1; text-decoration: none; margin-right: 1rem; }
        nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="wrap">
    <h1>Vanilla JS SPA</h1>
    <p>No framework, no build step — fetches <code>/api/v1/status</code> from Laravel on load.</p>

    <div id="badge" class="status loading">loading…</div>

    <pre id="output">Fetching /api/v1/status…</pre>

    <nav>
        <a href="/">← Home</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/api/v1/status" target="_blank">Raw JSON</a>
    </nav>
</div>

<script>
    (async () => {
        const badge  = document.getElementById('badge');
        const output = document.getElementById('output');
        try {
            const res  = await fetch('/api/v1/status');
            if (!res.ok) throw new Error('HTTP ' + res.status);
            const data = await res.json();
            badge.textContent = '✓ ' + data.status + ' · ' + data.app + ' · ' + data.env;
            badge.className   = 'status ok';
            output.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
            badge.textContent = '✗ ' + err.message;
            badge.className   = 'status error';
            output.textContent = String(err);
        }
    })();
</script>
</body>
</html>
