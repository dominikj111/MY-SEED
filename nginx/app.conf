# Edit this file on the host machine; restart nginx to apply (no rebuild needed).
# Changes: docker compose restart nginx

# ── HTTP server — works out of the box with no SSL setup ─────────────────────
# To enable HTTPS: run `just ssl`, then uncomment the HTTPS block below and
# replace this block with the redirect block (both shown in comments below).
server {
    listen 80;
    server_name _;

    root  /app/public;
    index index.php;

    client_max_body_size 150M;
    charset utf-8;

    # Reverse proxy headers — pass real client info to Laravel
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ── Python (Django + FastAPI) — served at /py/ ────────────────────────────
    # Full path is forwarded; Django URL patterns include the `py/` prefix.
    location /py/ {
        proxy_pass         http://python_asgi;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120;
    }

    # SPA — alias (not root) so /spa/ maps to /app/public/spa/ correctly
    location /spa/ {
        alias /app/public/spa/;
        index index.html;
        try_files $uri $uri/ /spa/index.html;
    }

    # Laravel routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM via named upstream block (defined in nginx.conf)
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        fastcgi_pass  php_fpm;
        fastcgi_index index.php;

        include fastcgi_params;
        include /etc/nginx/conf.d/fastcgi-params.conf;

        fastcgi_read_timeout 120;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires max;
        log_not_found off;
        access_log    off;
    }

    location ~ /\.(?!well-known) { deny all; }
    location ~* \.(env|log|ini|conf|sh|sql)$ { deny all; }
}

# ── To enable HTTPS — run `just ssl` first, then: ────────────────────────────
