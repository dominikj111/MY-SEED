services:

  python:
    build:
      context: ./python-app
    container_name: seed-python
    entrypoint: ["/bin/bash", "/app/entrypoint.sh"]
    volumes:
      - ./python-app:/app
      - ./logs/python:/var/log/python
    env_file: .env
    depends_on:
      - postgres
      - mailpit
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: seed-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/app.conf:/etc/nginx/conf.d/app.conf:ro
      - ./nginx/ssl.conf:/etc/nginx/ssl.conf:ro
      - ./configs/fastcgi-params.conf:/etc/nginx/conf.d/fastcgi-params.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
      - ./app/public:/app/public:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - php
      - python
    restart: unless-stopped

  php:
    build:
      context: ./docker/php
      args:
        PHP_VERSION: ${PHP_VERSION:-8.3}
        NODE_VERSION: ${NODE_VERSION:-20}
    container_name: seed-php
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    volumes:
      # Root .env mounted outside /app to avoid virtiofs nested-mount conflict.
      # Entrypoint symlinks /project.env → /app/.env on startup.
      - ./.env:/project.env
      # Entrypoint bind-mounted — no rebuild needed when it changes
      - ./docker/entrypoint.sh:/entrypoint.sh
      # PHP config — edit on host, restart container (no rebuild)
      - ./configs/php.ini:/usr/local/etc/php/php.ini:ro
      - ./configs/php-fpm.d/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
      # Mail config — copy from msmtprc.example to get started
      - ./configs/msmtprc:/etc/msmtprc:ro
      # Application code
      - ./app:/app
      # Logs — all accessible on host even when Docker is stopped
      - ./logs/php:/var/log/php
      - ./logs/mail:/var/log/mail
      # Laravel application logs override the parent ./app mount for this path
      - ./logs/app:/app/storage/logs
    env_file: .env
    depends_on:
      - postgres
      - mailpit
    restart: unless-stopped

  postgres:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    container_name: seed-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./database/data:/var/lib/postgresql/data
      - ./logs/postgres:/var/log/postgresql
    env_file: .env
    # File-based logging so logs appear in logs/postgres/ on the host
    command: >
      postgres
        -c logging_collector=on
        -c log_directory=/var/log/postgresql
        -c log_filename=postgresql.log
        -c log_rotation_age=1d
        -c log_statement=ddl
        -c log_connections=on
        -c log_disconnections=on
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: seed-mailpit
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: seed-adminer
    ports:
      - "${ADMINER_PORT:-8081}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    restart: unless-stopped
