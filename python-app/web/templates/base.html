<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}the-seed · Python{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .navbar-brand span { color: #0d6efd; font-weight: 700; }
    .badge-py { background: #306998; font-size: .65rem; vertical-align: middle; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/py/">the-seed <span>·py</span></a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        {% if user.is_authenticated %}
          <li class="nav-item"><a class="nav-link" href="/py/dashboard/">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/py/contact/">Contact</a></li>
          <li class="nav-item">
            <form method="post" action="/py/logout/" class="d-inline">
              {% csrf_token %}
              <button class="nav-link btn btn-link" type="submit">Logout ({{ user.username }})</button>
            </form>
          </li>
        {% else %}
          <li class="nav-item"><a class="nav-link" href="/py/login/">Login</a></li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>

<main class="container py-5">
  {% for message in messages %}
    <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}
  {% block content %}{% endblock %}
</main>

<footer class="text-center text-muted py-3 border-top">
  <small>the-seed · Python stack &mdash; Django + FastAPI · PostgreSQL · Mailpit</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
